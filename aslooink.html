<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Sana Kochu ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Dancing+Script:wght@600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #fffafa; /* Whitish pink vibe */
            overflow: hidden;
            font-family: 'Great Vibes', cursive;
            position: relative;
        }

        /* Floating Background Hearts */
        .heart-bg {
            position: absolute;
            color: rgba(255, 182, 193, 0.4);
            font-size: 25px;
            user-select: none;
            z-index: 1;
            animation: float 4s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .container {
            background-color: #ffffff;
            padding: 40px 30px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(255, 182, 193, 0.4);
            text-align: center;
            z-index: 10;
            width: 90%;
            max-width: 450px;
            border: 2px solid #ffb6c1;
            transition: all 0.5s ease-in-out;
        }

        .step-counter {
            font-family: 'Dancing Script', cursive;
            font-size: 1.2rem;
            color: #ffb6c1;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 2.5rem;
            color: #d63384;
            margin-bottom: 30px;
            line-height: 1.2;
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .opt-btn {
            padding: 12px 20px;
            font-size: 1.4rem;
            cursor: pointer;
            border-radius: 15px;
            border: 1.5px solid #ffb6c1;
            background-color: #fff5f7;
            color: #d63384;
            font-family: 'Dancing Script', cursive;
            transition: 0.3s;
            text-align: left;
            display: flex;
            align-items: center;
        }

        .opt-btn:hover {
            background-color: #ff69b4;
            color: white;
            transform: scale(1.03);
        }

        .label-circle {
            background: white;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            font-weight: bold;
            color: #ff69b4;
            font-family: Arial, sans-serif;
            font-size: 0.9rem;
        }

        #noBtn {
            background-color: #ffffff;
            color: #ff69b4;
            border: 1px solid #ffb6c1;
            position: absolute;
            transition: 0.1s ease-out;
            font-family: 'Dancing Script', cursive;
            padding: 10px 30px;
            font-size: 1.5rem;
            border-radius: 12px;
        }

        #result {
            display: none;
            font-size: 4.5rem;
            color: #d63384;
            animation: heartBeat 1.2s infinite;
            z-index: 30;
        }

        @keyframes heartBeat {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="heart-bg" style="top:10%; left:10%;">❤</div>
    <div class="heart-bg" style="top:25%; right:15%;">❤</div>
    <div class="heart-bg" style="bottom:20%; left:20%;">❤</div>
    <div class="heart-bg" style="bottom:10%; right:10%;">❤</div>

    <div class="container" id="mainBox">
        <div id="quiz-content">
            <div class="step-counter" id="step-text">Question 1 of 8</div>
            <h1 id="question-text">Loading...</h1>
            <div class="options-grid" id="options-container"></div>
        </div>
        
        <div id="final-choice" class="hidden">
            <h1>Sana kochee enne ishtaanoo?</h1>
            <div style="min-height: 120px; position: relative; display: flex; justify-content: center; align-items: center; gap: 20px;">
                <button id="yesBtn" class="opt-btn" style="background:#ff69b4; color:white; padding:10px 40px;" onclick="showLove()">Yes</button>
                <button id="noBtn" onmouseover="moveNo()" ontouchstart="moveNo()">No</button>
            </div>
        </div>
    </div>

    <div id="result">I knew it! ❤️</div>

    <script>
        const questions = [
            { q: "What do you think about Asloo?", a: ["I think about him occasionally", "I think about him sometimes", "I think about him quite often", "I think about him more than I expected"] },
            { q: "How do you feel when Asloo talks to you?", a: ["It feels a little nice", "It feels pretty nice", "It makes me happy", "It makes me really happy"] },
            { q: "If Asloo stopped talking for a while, what would happen?", a: ["I’d probably notice", "I’d miss him a little", "I’d miss him quite a bit", "I’d really miss him"] },
            { q: "Why do you think you feel this way about Asloo?", a: ["Maybe I like him a little", "I probably like him", "I like him quite a lot", "I might actually love him"] },
            { q: "When Asloo’s name pops up on your phone, what’s your reaction?", a: ["I feel a little curious", "I feel a bit happy", "I smile when I see it", "I get really happy"] },
            { q: "If someone asked you about Asloo, what would you say?", a: ["He’s someone important", "He’s special to me", "I care about him a lot", "He means a lot to me"] },
            { q: "Be honest… what word best describes your feelings?", a: ["A growing feeling", "A strong liking", "Deep affection", "Something very close to love"] },
            { q: "What feels most accurate about your feelings for Asloo?", a: ["I might be falling for Asloo", "I’m probably falling for Asloo", "I think I love Asloo", "I definitely love Asloo"] }
        ];

        let currentStep = 0;
        const labels = ["A", "B", "C", "D"];

        function loadQuestion() {
            if (currentStep < questions.length) {
                const qData = questions[currentStep];
                document.getElementById('step-text').innerText = `Question ${currentStep + 1} of 8`;
                document.getElementById('question-text').innerText = qData.q;
                
                const container = document.getElementById('options-container');
                container.innerHTML = '';

                qData.a.forEach((opt, i) => {
                    const btn = document.createElement('button');
                    btn.className = 'opt-btn';
                    btn.innerHTML = `<span class="label-circle">${labels[i]}</span> ${opt}`;
                    btn.onclick = nextQuestion;
                    container.appendChild(btn);
                });
            } else {
                document.getElementById('quiz-content').classList.add('hidden');
                document.getElementById('final-choice').classList.remove('hidden');
            }
        }

        function nextQuestion() {
            currentStep++;
            loadQuestion();
        }

        function moveNo() {
            const btn = document.getElementById('noBtn');
            const maxX = window.innerWidth - btn.offsetWidth - 40;
            const maxY = window.innerHeight - btn.offsetHeight - 40;
            btn.style.position = 'fixed';
            btn.style.left = Math.random() * maxX + 'px';
            btn.style.top = Math.random() * maxY + 'px';
        }

        function showLove() {
            document.getElementById('mainBox').style.display = 'none';
            document.getElementById('result').style.display = 'block';
        }

        loadQuestion();
    </script>
</body>
</html>
