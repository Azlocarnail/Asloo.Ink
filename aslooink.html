
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Sana Kochu ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Dancing+Script:wght@600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #ffffff;
            overflow: hidden;
            font-family: 'Great Vibes', cursive;
            position: relative;
        }

        .heart {
            position: absolute;
            color: rgba(255, 182, 193, 0.5);
            font-size: 30px;
            user-select: none;
            z-index: 1;
        }

        .container {
            background-color: #ffdae0;
            padding: 50px 40px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
            z-index: 10;
            width: 85%;
            max-width: 450px;
            border: 2px solid #ffb6c1;
            transition: 0.5s;
        }

        h1 {
            font-size: 3rem;
            color: #d63384;
            margin-bottom: 40px;
        }

        .btn-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            min-height: 100px;
            position: relative;
        }

        button {
            padding: 12px 35px;
            font-size: 1.8rem;
            cursor: pointer;
            border-radius: 15px;
            border: none;
            font-family: 'Dancing Script', cursive;
            z-index: 20;
        }

        #yesBtn {
            background-color: #ff69b4;
            color: white;
        }

        #noBtn {
            background-color: #ffffff;
            color: #ff69b4;
            border: 1px solid #ffb6c1;
            /* Instant neengal fix cheyyan */
            position: absolute;
            right: 15%; 
            transition: 0.1s ease-out;
        }

        #result {
            display: none;
            font-size: 4rem;
            color: #d63384;
            animation: heartBeat 1s infinite;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            text-align: center;
            z-index: 30;
        }

        @keyframes heartBeat {
            0% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.1); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }
    </style>
</head>
<body>

    <div class="heart" style="top:10%; left:10%;">❤</div>
    <div class="heart" style="top:25%; right:15%;">❤</div>
    <div class="heart" style="bottom:20%; left:20%;">❤</div>
    <div class="heart" style="bottom:10%; right:10%;">❤</div>
    <div class="heart" style="top:50%; left:5%;">❤</div>
    <div class="heart" style="top:40%; right:5%;">❤</div>

    <div class="container" id="mainBox">
        <h1 id="question">Sana kochee enne ishtaanoo?</h1>
        
        <div class="btn-container">
            <button id="yesBtn" onclick="showLove()">Yes</button>
            <button id="noBtn" onmouseover="moveNo()" ontouchstart="moveNo()">No</button>
        </div>
    </div>

    <div id="result">I knew it! ❤️</div>

    <script>
        function moveNo() {
            const btn = document.getElementById('noBtn');
            
            // Screen limits within safe area
            const maxX = window.innerWidth - btn.offsetWidth - 30;
            const maxY = window.innerHeight - btn.offsetHeight - 30;
            
            const randomX = Math.floor(Math.random() * maxX);
            const randomY = Math.floor(Math.random() * maxY);
            
            // Position 'fixed' aakki instant movement koduthu
            btn.style.position = 'fixed';
            btn.style.left = randomX + 'px';
            btn.style.top = randomY + 'px';
        }

        function showLove() {
            document.getElementById('mainBox').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('mainBox').style.display = 'none';
                document.getElementById('result').style.display = 'block';
            }, 500);
        }
    </script>
</body>
</html>
