
    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Sana Kochu</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Dancing+Script:wght@600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #ffffff;
            overflow: hidden;
            font-family: 'Great Vibes', cursive;
            position: relative;
        }

        /* Background Hearts */
        .heart {
            position: absolute;
            color: rgba(255, 182, 193, 0.5); /* 50% opacity pink */
            font-size: 30px;
            user-select: none;
            z-index: 1;
        }

        /* Main Box */
        .container {
            background-color: #ffdae0; /* Darker pink box */
            padding: 50px 40px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
            z-index: 10;
            max-width: 90%;
            border: 2px solid #ffb6c1;
        }

        h1 {
            font-size: 3rem;
            color: #d63384;
            margin-bottom: 30px;
        }

        .btn-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            height: 60px;
            align-items: center;
        }

        button {
            padding: 10px 35px;
            font-size: 1.8rem;
            cursor: pointer;
            border-radius: 15px;
            border: none;
            font-family: 'Dancing Script', cursive;
            transition: 0.2s;
        }

        #yesBtn {
            background-color: #ff69b4;
            color: white;
        }

        #noBtn {
            background-color: #ffffff;
            color: #ff69b4;
            position: absolute; /* Needed for random movement */
        }

        /* Result Popup */
        #result {
            display: none;
            font-size: 3.5rem;
            color: #d63384;
            margin-top: 20px;
            animation: heartBeat 1s infinite;
        }

        @keyframes heartBeat {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="heart" style="top:10%; left:10%;">❤</div>
    <div class="heart" style="top:20%; right:15%;">❤</div>
    <div class="heart" style="bottom:15%; left:20%;">❤</div>
    <div class="heart" style="bottom:10%; right:10%;">❤</div>
    <div class="heart" style="top:50%; left:5%;">❤</div>
    <div class="heart" style="top:40%; right:5%;">❤</div>

    <div class="container" id="mainBox">
        <h1 id="question">Sana kochee enne ishtaanoo?</h1>
        
        <div class="btn-container">
            <button id="yesBtn" onclick="showLove()">Yes</button>
            <button id="noBtn" onmouseover="moveNo()" onclick="moveNo()">No</button>
        </div>

        <div id="result">I knew it! ❤️</div>
    </div>

    <script>
        // No button-ne odikkaan ulla function
        function moveNo() {
            const btn = document.getElementById('noBtn');
            // Window-inte width-um height-um nokkunnu
            const x = Math.random() * (window.innerWidth - btn.offsetWidth);
            const y = Math.random() * (window.innerHeight - btn.offsetHeight);
            
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
        }

        // Yes click cheyvumbo
        function showLove() {
            document.getElementById('question').style.display = 'none';
            document.getElementById('yesBtn').style.display = 'none';
            document.getElementById('noBtn').style.display = 'none';
            document.getElementById('result').style.display = 'block';
            
            // Background box white aakkunnu to focus on text
            document.getElementById('mainBox').style.backgroundColor = 'transparent';
            document.getElementById('mainBox').style.boxShadow = 'none';
            document.getElementById('mainBox').style.border = 'none';
        }
    </script>
</body>
</html>
