<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Sana Kochu ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Dancing+Script:wght@600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #ffffff; /* White Screen */
            overflow: hidden;
            font-family: 'Great Vibes', cursive; /* Italian Classic Font */
            position: relative;
        }

        /* 50% Opacity Pink Hearts scattered around */
        .heart-bg {
            position: absolute;
            color: rgba(255, 182, 193, 0.5);
            font-size: 35px;
            user-select: none;
            z-index: 1;
        }

        /* Main Container Box */
        .glass-box {
            background-color: #ffdae0; /* Darker Pink Box */
            padding: 60px 40px;
            border-radius: 40px;
            box-shadow: 0 15px 35px rgba(214, 51, 132, 0.1);
            text-align: center;
            z-index: 10;
            width: 90%;
            max-width: 500px;
            border: 2px solid #ffb6c1;
        }

        h1 {
            font-size: 3.5rem;
            color: #d63384;
            margin-bottom: 40px;
            font-weight: normal;
        }

        .action-area {
            display: flex;
            justify-content: center;
            gap: 30px;
            min-height: 80px;
            align-items: center;
        }

        button {
            padding: 12px 40px;
            font-size: 2rem;
            cursor: pointer;
            border-radius: 20px;
            border: none;
            font-family: 'Dancing Script', cursive;
            transition: 0.3s;
        }

        #yesBtn {
            background-color: #ff69b4;
            color: white;
            box-shadow: 0 5px 15px rgba(255, 105, 180, 0.3);
        }

        #noBtn {
            background-color: #ffffff;
            color: #ff69b4;
            position: absolute; /* Essential for jumping around */
            border: 1px solid #ffb6c1;
            z-index: 100;
        }

        /* Secret Message Box */
        #secret-message {
            display: none;
            text-align: center;
        }

        #secret-message h2 {
            font-size: 5rem;
            color: #d63384;
            margin: 0;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="heart-bg" style="top: 10%; left: 15%;">❤</div>
    <div class="heart-bg" style="top: 20%; right: 20%;">❤</div>
    <div class="heart-bg" style="bottom: 15%; left: 10%;">❤</div>
    <div class="heart-bg" style="bottom: 25%; right: 15%;">❤</div>
    <div class="heart-bg" style="top: 50%; left: 5%;">❤</div>
    <div class="heart-bg" style="top: 45%; right: 8%;">❤</div>
    <div class="heart-bg" style="bottom: 5%; left: 45%;">❤</div>

    <div class="glass-box" id="mainContainer">
        <div id="quiz-content">
            <h1>Sana kochee enne ishtaanoo?</h1>
            <div class="action-area">
                <button id="yesBtn" onclick="revealLove()">Yes</button>
                <button id="noBtn" onmouseover="moveNo()" onclick="moveNo()">No</button>
            </div>
        </div>

        <div id="secret-message">
            <h2>I knew it ! ❤️</h2>
        </div>
    </div>

    <script>
        // No button-ne thodaan sammathikkilla!
        function moveNo() {
            const btn = document.getElementById('noBtn');
            // Calculating random positions within the screen
            const padding = 50;
            const maxX = window.innerWidth - btn.offsetWidth - padding;
            const maxY = window.innerHeight - btn.offsetHeight - padding;
            
            const randomX = Math.floor(Math.random() * maxX);
            const randomY = Math.floor(Math.random() * maxY);
            
            btn.style.left = randomX + 'px';
            btn.style.top = randomY + 'px';
        }

        // Yes click cheyvumbo ulla magic
        function revealLove() {
            document.getElementById('quiz-content').style.display = 'none';
            document.getElementById('secret-message').style.display = 'block';
            
            // Making the box transparent for a cleaner "I knew it" look
            const container = document.getElementById('mainContainer');
            container.style.backgroundColor = 'transparent';
            container.style.border = 'none';
            container.style.boxShadow = 'none';
        }
    </script>
</body>
</html>
